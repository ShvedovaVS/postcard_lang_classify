version: '3.8'

services:
  postcard-processor:
    build: .
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - OCR_ENGINE=easyocr  # 👈 Меняйте здесь
      - INPUT_DIR=/app/data/input
      - OUTPUT_DIR=/app/data/output
      - PROCESSED_DIR=/app/data/processed
      - PYTHONUNBUFFERED=1
    command: python -m app.main